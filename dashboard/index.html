<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="POD Pulse — Your daily Print on Demand dashboard. Find trending POD shirts, stitched designs, and insights from Etsy, eRank, Printful and Printify." />
  <title>POD Pulse — Print on Demand Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/index.css" />
</head>

<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="12" stroke="url(#logo-grad)" stroke-width="2.5" fill="none" />
            <path d="M10 18 L14 8 L18 18" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" fill="none" />
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#1990C6" />
                <stop offset="100%" stop-color="#22C55E" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">POD Pulse</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="feed" id="nav-feed">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 11a9 9 0 0 1 9 9" />
            <path d="M4 4a16 16 0 0 1 16 16" />
            <circle cx="5" cy="20" r="1" />
          </svg>
          <span>Feed</span>
        </button>
        <button class="nav-btn" data-view="saved" id="nav-saved">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
          </svg>
          <span>Saved</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="refresh-info" id="refresh-info">
          <div class="refresh-dot"></div>
          <span>Updated just now</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <button class="mobile-menu-btn" id="mobile-menu-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <h1 class="page-title" id="page-title">Today's POD Pulse</h1>
        </div>
        <div class="header-right">
          <div class="search-box" id="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" placeholder="Search articles..." id="search-input" />
          </div>
          <div class="stale-badge hidden" id="stale-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span>Data may be stale</span>
          </div>
        </div>
      </header>

      <!-- Source Filters -->
      <div class="source-filters" id="source-filters">
        <button class="filter-btn active" data-source="all" id="filter-all">All Sources</button>
        <button class="filter-btn" data-source="etsy" id="filter-etsy">
          <span class="source-dot etsy"></span> Etsy
        </button>
        <button class="filter-btn" data-source="erank" id="filter-erank">
          <span class="source-dot erank"></span> eRank
        </button>
        <button class="filter-btn" data-source="printful" id="filter-printful">
          <span class="source-dot printful"></span> Printful
        </button>
        <button class="filter-btn" data-source="printify" id="filter-printify">
          <span class="source-dot printify"></span> Printify
        </button>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat-chip" id="stat-total">
          <span class="stat-number">0</span>
          <span class="stat-label">Articles</span>
        </div>
        <div class="stat-chip" id="stat-saved">
          <span class="stat-number">0</span>
          <span class="stat-label">Saved</span>
        </div>
        <div class="stat-chip" id="stat-sources">
          <span class="stat-number">4</span>
          <span class="stat-label">Sources</span>
        </div>
      </div>

      <!-- Articles Grid -->
      <div class="articles-grid" id="articles-grid">
        <!-- Populated by main.js -->
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
            <path d="M4 11a9 9 0 0 1 9 9" />
            <path d="M4 4a16 16 0 0 1 16 16" />
            <circle cx="5" cy="20" r="1" />
          </svg>
        </div>
        <h2>No articles found</h2>
        <p>No AI news in the last 24 hours matching your filters.</p>
      </div>

      <!-- Loading State -->
      <div class="loading-state" id="loading-state">
        <div class="loader">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
        </div>
        <p>Fetching the latest AI news...</p>
      </div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
